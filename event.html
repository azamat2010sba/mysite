<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новость</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body {
  background: #f5f5f5;
  font-family: Arial, sans-serif;
}

.event-page {
  max-width: 800px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
}

.event-title {
  font-size: 34px;
  font-weight: bold;
  margin-bottom: 10px;
}

.event-meta {
  color: gray;
  margin-bottom: 20px;
  font-size: 14px;
}

.main-img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}

.event-text p {
  font-size: 18px;
  line-height: 1.8;
  margin-bottom: 20px;
}

.event-img {
  width: 100%;
  border-radius: 10px;
  margin: 20px 0;
  cursor: pointer;
}

.socials {
  margin-top: 40px;
  border-top: 1px solid #ddd;
  padding-top: 20px;
}

.share-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.back {
  display: inline-block;
  margin-top: 20px;
  color: black;
  text-decoration: none;
}
</style>

</head>
<body>

<header>
  <div class="logo-box">
    <img src="images/logo/1776112367834.png" class="logo">
    <h2>КУЛЬТУРНЫЙ ЦЕНТР №54 «УЗБЕК-КАЗАХ</h2>
  </div>

  <div class="menu-toggle" id="menu-toggle">☰</div>

  <nav id="nav">
    <a href="index.html" class="nav-link">Главная</a>
    <a href="about.html" class="nav-link">О нас</a>
    <a href="projects.html" class="nav-link">Кружки</a>
    <a href="events.html" class="nav-link">События</a>
    <a href="contact.html" class="nav-link">Контакты</a>
  </nav>
</header>

<div class="event-page">

  <h1 id="title" class="event-title"></h1>

  <div class="event-meta">
    <span id="date"></span> • Источник: Хокимият
  </div>

  <img id="mainImg" class="main-img">

  <div id="content" class="event-text"></div>

  <div class="socials">
    <h3>Подписаться:</h3>

    <a href="https://t.me/Madaniyat54Markazi_saksonota"><i class="bi bi-telegram"></i></a>
    <a href="https://www.instagram.com/madaniyat_54_markazi"><i class="bi bi-instagram"></i></a>

    <br>

    <button class="share-btn" onclick="share()">
      Поделиться
    </button>
  </div>

  <a href="events.html" class="back">← Назад</a>

</div>

<script>
const id = new URLSearchParams(location.search).get("id");

fetch("data/events.json")
  .then(res => res.json())
  .then(data => {

    const event = data.find(e => e.id == id);

    if (!event) {
      document.body.innerHTML = "<h2>Событие не найдено</h2>";
      return;
    }

    document.getElementById("title").innerText = event.title;
    document.getElementById("date").innerText = event.date;
    document.getElementById("mainImg").src = event.image;

    const content = document.getElementById("content");

    // 🔥 НОВОЕ: если есть sections (3 картинки + 3 текста)
    if (event.sections) {
      event.sections.forEach(sec => {
        content.innerHTML += `
          <img src="${sec.img}" class="event-img">
          <p>${sec.text}</p>
        `;
      });
    }

    // 🔥 СТАРОЕ: если используешь fullText + gallery
    else if (event.fullText) {
      const paragraphs = event.fullText.split("\n");

      paragraphs.forEach((p, index) => {
        content.innerHTML += `<p>${p}</p>`;

        if (event.gallery && event.gallery[index]) {
          content.innerHTML += `<img src="${event.gallery[index]}" class="event-img">`;
        }
      });
    }

    // увеличение картинки
    document.querySelectorAll(".event-img").forEach(img => {
      img.onclick = () => {
        const modal = document.createElement("div");

        modal.style.position = "fixed";
        modal.style.top = 0;
        modal.style.left = 0;
        modal.style.width = "100%";
        modal.style.height = "100%";
        modal.style.background = "rgba(0,0,0,0.8)";
        modal.style.display = "flex";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";

        modal.innerHTML = `<img src="${img.src}" style="max-width:90%; max-height:90%;">`;

        modal.onclick = () => modal.remove();

        document.body.appendChild(modal);
      };
    });

  });

function share() {
  navigator.clipboard.writeText(window.location.href);
  alert("Ссылка скопирована!");
}
</script>

<script src="js/main.js"></script>
</body>
</html>
