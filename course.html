<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кружок</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>

    <div class="logo-box">
      <img src="images/logo/1776112367834.png" class="logo">
      <h2>КУЛЬТУРНЫЙ ЦЕНТР №54 «УЗБЕК-КАЗАХ</h2>
    </div>
  
    <div class="menu-toggle" id="menu-toggle">☰</div>
  
    <nav id="nav">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="about.html" class="nav-link">О нас</a>
      <a href="projects.html" class="nav-link">Кружки</a>
      <a href="events.html" class="nav-link">События</a>
      <a href="contact.html" class="nav-link">Контакты</a>
    </nav>
  
  </header>

<section class="course-page">

  <div class="course-container">

    <!-- КАРТИНКА -->
    <div class="course-img-box">
      <img id="course-img">
    </div>

    <!-- ИНФА -->
    <div class="course-info">
      <h1 id="course-title"></h1>

      <p id="course-desc"></p>

      <div class="course-details">
        <p>⏰ <span id="course-time"></span></p>
        <p>👨‍🏫 <span id="course-teacher"></span></p>
      </div>

      <button class="course-btn" onclick="openForm(selectedCourse)">
        Записаться
      </button>

    </div>

  </div>

</section>
<div id="form-modal" class="modal">
  <div class="modal-content">

    <h2>Записаться на курс</h2>

    <input id="name" placeholder="Имя">
    <input id="surname" placeholder="Фамилия">
    <input id="phone" placeholder="Телефон">

    <button onclick="submitForm()">Отправить</button>
    <button onclick="closeForm()" class="cancel-btn">Отмена</button>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
